<!-- QingShan Blog - 顶部Banner背景图轮播 + 增强功能 -->

<script>
(function() {
  'use strict';

  // ============================================
  // 顶部 Banner 背景图轮播
  // ============================================
  var bannerImages = [
    '/images/bg-2.jpg',
    '/images/bg-3.jpg',
    '/images/bg-4.png',
    '/images/bg-5.png'
  ];

  var currentBannerIndex = 0;
  var bannerInterval = 10000; // 10秒切换

  function preloadImages(urls) {
    urls.forEach(function(url) {
      var img = new Image();
      img.src = url;
    });
  }

  function createBanner() {
    // 检查是否已存在
    if (document.getElementById('hero-banner')) return;

    var banner = document.createElement('div');
    banner.id = 'hero-banner';

    var bgLayer = document.createElement('div');
    bgLayer.className = 'banner-bg';

    var bgNextLayer = document.createElement('div');
    bgNextLayer.className = 'banner-bg-next';

    banner.appendChild(bgLayer);
    banner.appendChild(bgNextLayer);

    // 插入到 .main 之前（全宽独立元素，不进入 flex 容器）
    var mainEl = document.querySelector('main.main');
    if (mainEl) {
      mainEl.parentNode.insertBefore(banner, mainEl);
    } else {
      // 备选：插到 headband 之后
      var headband = document.querySelector('.headband');
      if (headband && headband.nextSibling) {
        headband.parentNode.insertBefore(banner, headband.nextSibling);
      } else {
        document.body.insertBefore(banner, document.body.firstChild);
      }
    }

    return banner;
  }

  function initBanner() {
    if (bannerImages.length === 0) return;

    var banner = createBanner();
    if (!banner) return;

    var bgLayer = banner.querySelector('.banner-bg');
    var bgNextLayer = banner.querySelector('.banner-bg-next');
    if (!bgLayer || !bgNextLayer) return;

    // 随机起始
    currentBannerIndex = Math.floor(Math.random() * bannerImages.length);
    bgLayer.style.backgroundImage = 'url(' + bannerImages[currentBannerIndex] + ')';

    preloadImages(bannerImages);

    // 开始轮播
    if (bannerImages.length > 1) {
      setInterval(function() {
        var nextIndex = (currentBannerIndex + 1) % bannerImages.length;
        bgNextLayer.style.backgroundImage = 'url(' + bannerImages[nextIndex] + ')';
        bgNextLayer.style.opacity = '1';
        bgLayer.style.opacity = '0';

        setTimeout(function() {
          bgLayer.style.transition = 'none';
          bgLayer.style.backgroundImage = 'url(' + bannerImages[nextIndex] + ')';
          bgLayer.style.opacity = '1';
          bgNextLayer.style.opacity = '0';

          setTimeout(function() {
            bgLayer.style.transition = 'opacity 2s ease-in-out';
          }, 50);

          currentBannerIndex = nextIndex;
        }, 2100);
      }, bannerInterval);
    }
  }

  // ============================================
  // Scroll Reveal Animation
  // ============================================
  function initScrollReveal() {
    var selectors = '.post-block, .pagination, .comments, .sub-menu';
    var elements = document.querySelectorAll(selectors);
    if (!elements.length) return;

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, {
        threshold: 0.08,
        rootMargin: '0px 0px -40px 0px'
      });

      elements.forEach(function(el) {
        el.classList.add('scroll-reveal');
        observer.observe(el);
      });
    } else {
      elements.forEach(function(el) {
        el.style.opacity = '1';
      });
    }
  }

  // ============================================
  // Typing Effect for Subtitle
  // ============================================
  function initSubtitleEffect() {
    var subtitle = document.querySelector('.site-subtitle');
    if (!subtitle || subtitle.dataset.typed) return;
    subtitle.dataset.typed = 'true';

    var text = subtitle.textContent;
    subtitle.textContent = '';
    subtitle.style.borderRight = '2px solid #c0956c';
    subtitle.style.display = 'inline-block';

    var i = 0;
    var timer = setInterval(function() {
      if (i < text.length) {
        subtitle.textContent += text.charAt(i);
        i++;
      } else {
        clearInterval(timer);
        setTimeout(function() {
          subtitle.style.borderRight = 'none';
        }, 1500);
      }
    }, 100);
  }

  // ============================================
  // Search Popup Enhancement: 显示最近文章
  // ============================================
  function initSearchEnhancement() {
    var searchContainer = document.querySelector('.search-result-container');
    var searchInput = document.querySelector('.search-input');
    if (!searchContainer || !searchInput) return;

    function showRecentPosts() {
      fetch('/search.xml')
        .then(function(res) { return res.text(); })
        .then(function(xmlText) {
          var parser = new DOMParser();
          var doc = parser.parseFromString(xmlText, 'text/xml');
          var entries = doc.querySelectorAll('entry');
          if (!entries.length) return;

          var html = '<div class="search-recent-posts">';
          html += '<div class="search-recent-title">📄 最近发布的文章</div>';
          html += '<ul class="search-recent-list">';

          var count = Math.min(entries.length, 10);
          for (var i = 0; i < count; i++) {
            var entry = entries[i];
            var title = entry.querySelector('title') ? entry.querySelector('title').textContent : '';
            var url = entry.querySelector('url') ? entry.querySelector('url').textContent : '#';
            var dateNode = entry.querySelector('date');
            var dateStr = '';
            if (dateNode) {
              var d = new Date(dateNode.textContent);
              dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            }
            html += '<li class="search-recent-item">';
            html += '<a href="' + url + '">';
            html += '<div class="search-recent-item-title">' + title + '</div>';
            if (dateStr) html += '<div class="search-recent-item-date">' + dateStr + '</div>';
            html += '</a></li>';
          }
          html += '</ul></div>';

          window._recentPostsHTML = html;
          if (!searchInput.value.trim()) {
            searchContainer.innerHTML = html;
          }
        })
        .catch(function() {});
    }

    // 监听搜索弹窗打开
    var observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.target.classList && mutation.target.classList.contains('search-active')) {
          setTimeout(function() {
            if (!searchInput.value.trim()) {
              if (window._recentPostsHTML) {
                searchContainer.innerHTML = window._recentPostsHTML;
              } else {
                showRecentPosts();
              }
            }
          }, 300);
        }
      });
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    searchInput.addEventListener('input', function() {
      if (!searchInput.value.trim() && window._recentPostsHTML) {
        setTimeout(function() {
          if (!searchInput.value.trim()) {
            searchContainer.innerHTML = window._recentPostsHTML;
          }
        }, 100);
      }
    });

    showRecentPosts();
  }

  // ============================================
  // Initialize
  // ============================================
  function init() {
    initBanner();
    initScrollReveal();
    initSubtitleEffect();
    initSearchEnhancement();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  document.addEventListener('pjax:complete', function() {
    initScrollReveal();
    initSearchEnhancement();
  });
})();
</script>
